<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization User Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box" style="max-width: 680px;">
            <div class="login-header">
                <img src="assets/SQImpact_v2.png" alt="SQ Impact" style="width: 280px; max-width: 100%; margin-bottom: 8px;">
                <p>Organization user management</p>
                <h3 id="orgNameHeading" style="margin-top: 8px;"></h3>
            </div>

            <form id="addUserForm">
                <div class="form-group">
                    <label for="newFullName">Full name</label>
                    <input type="text" id="newFullName" placeholder="User full name">
                </div>
                <div class="form-group">
                    <label for="newEmail">Email (optional)</label>
                    <input type="email" id="newEmail" placeholder="user@company.com">
                </div>
                <div class="form-group">
                    <label for="newUsername">Username</label>
                    <input type="text" id="newUsername" required placeholder="username">
                </div>
                <div class="form-group">
                    <label for="newPassword">Password</label>
                    <input type="password" id="newPassword" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="newConfirmPassword">Confirm password</label>
                    <input type="password" id="newConfirmPassword" required placeholder="••••••••">
                </div>
                <div id="addUserError" class="error-message" role="alert"></div>
                <div id="addUserSuccess" class="success-message" style="color: var(--success-color);"></div>
                <button type="submit" class="btn-primary">Add organization user</button>
            </form>

            <div class="card p-4" style="margin-top: 20px;">
                <h3 style="margin-bottom: 10px;">Organization users</h3>
                <p style="color: var(--text-secondary); margin-bottom: 10px;">
                    Existing passwords are securely hashed and cannot be viewed. You can reset a password via Edit.
                </p>
                <div id="usersError" class="error-message" role="alert"></div>
                <div class="table-wrapper" style="max-height: 320px; overflow: auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 16px;">
                <button id="openOrgDataBtn" type="button" class="btn-link">Open organization data</button>
                <button id="backToSigninBtn" type="button" class="btn-link">Back to sign in</button>
                <button id="orgLogoutBtn" type="button" class="btn-link">Logout</button>
            </div>
        </div>
    </div>

    <script src="js/organization-users.js"></script>
</body>
</html>
