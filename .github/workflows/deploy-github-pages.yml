# Single GitHub Pages deployment — only this workflow should upload "github-pages" artifacts.
# If deploy fails with "Multiple artifacts named github-pages", delete/disable other Pages workflows
# in the repo (Actions tab → Workflows → remove duplicates).

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: |
          mkdir -p _site
          cp index.html _site/
          if [ -f organization-users.html ]; then
            cp organization-users.html _site/
          fi
          cp -r js css assets _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
